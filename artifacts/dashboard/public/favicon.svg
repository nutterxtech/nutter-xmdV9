<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window background -->
  <rect width="180" height="180" rx="36" fill="#0d1117"/>

  <!-- Top bar (title bar) -->
  <rect x="0" y="0" width="180" height="40" rx="36" fill="#161b22"/>
  <rect x="0" y="20" width="180" height="20" fill="#161b22"/>

  <!-- Traffic light dots -->
  <circle cx="32" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="22" r="6" fill="#febc2e"/>
  <circle cx="72" cy="22" r="6" fill="#28c840"/>

  <!-- Prompt line: "> _" in bright green -->
  <!-- ">" chevron -->
  <polyline points="24,82 42,98 24,114" stroke="#00ff41" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor block after prompt -->
  <rect x="54" y="83" width="22" height="30" rx="3" fill="#00ff41"/>

  <!-- Second line (dimmer, like typed text) -->
  <rect x="24" y="128" width="70" height="8" rx="4" fill="#00ff41" opacity="0.35"/>
  <rect x="102" y="128" width="30" height="8" rx="4" fill="#00ff41" opacity="0.2"/>
</svg>
